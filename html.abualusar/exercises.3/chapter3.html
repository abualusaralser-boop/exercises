<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Theme Images</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: #d0e8f2; color: #333; padding: 50px; }
        .card { display: inline-block; margin: 20px; }
        .f1 { filter: sepia(50%); }
        .f2 { filter: contrast(120%); }
        .f3 { filter: saturate(150%); }
    </style>
</head>
<body>
    <h1>Nature Theme</h1>
    
    <div class="card">
        <img class="f1" src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=400&h=267&fit=crop" alt="Ocean wave on beach" width="400" height="267" title="Ocean Wave">
        <p>License: Unsplash License (Free to use)</p>
    </div>

    <div class="card">
        <img class="f2" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=267&fit=crop" alt="Pristine forest" width="400" height="267" title="Forest Sunlight">
        <p>License: Unsplash License (Free to use)</p>
    </div>

    <div class="card">
        <img class="f3" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=267&fit=crop" alt="Snow-covered mountain" width="400" height="267" title="Mountain Peak">
        <p>License: Unsplash License (Free to use)</p>
    </div>
</body>
</html>
