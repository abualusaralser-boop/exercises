<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrol Calculator</title>
  <style>
    /* Base page styling for a clean and professional calculator layout */
    :root {
      --bg-start: #1b2a47;
      --bg-end: #2b4a7a;
      --card-bg: #f8fbff;
      --text: #1f3252;
      --accent: #ff8c42;
      --accent-dark: #e67c25;
      --border: #c3d3e8;
      --shadow: 0 18px 40px rgba(15, 40, 80, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(255, 140, 66, 0.16), transparent 30%),
        linear-gradient(155deg, var(--bg-start), var(--bg-end));
    }

    .calculator-card {
      width: min(520px, calc(100vw - 32px));
      background: var(--card-bg);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(31, 50, 82, 0.08);
    }

    .card-header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.6rem);
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: #47576b;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      margin-top: 10px;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      direction: ltr;
      unicode-bidi: isolate-override;
      text-align: left;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 140, 66, 0.16);
    }

    button {
      width: 100%;
      margin-top: 28px;
      padding: 16px 20px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #ffb96b);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(255, 140, 66, 0.25);
      background: linear-gradient(135deg, var(--accent-dark), #ff9d34);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 16px;
      background: #eef5ff;
      border: 1px solid rgba(109, 142, 200, 0.26);
      font-size: 1.05rem;
      color: var(--text);
    }

    @media (max-width: 420px) {
      .calculator-card {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator-card">
    <header class="card-header">
      <h1>Petrol Calculator</h1>
      <p>Enter the price per liter and the number of liters purchased to calculate the total cost.</p>
    </header>

    <form id="petrol-form" novalidate>
      <label for="price-per-liter">Price per liter</label>
      <input
        id="price-per-liter"
        type="number"
        step="0.01"
        min="0"
        value="1.72"
        aria-label="Price per liter"
        dir="ltr"
        required
      >

      <label for="liters">Liters purchased</label>
      <input
        id="liters"
        type="number"
        step="0.01"
        min="0"
        value="0"
        aria-label="Liters purchased"
        dir="ltr"
        required
      >

      <button id="calculate-button" type="button">Calculate cost</button>
    </form>

    <p id="result" class="result" aria-live="polite">
      The total cost will appear here.
    </p>
  </main>

  <script>
    // Get the main DOM elements from the page.
    const priceInput = document.getElementById("price-per-liter");
    const litersInput = document.getElementById("liters");
    const calculateButton = document.getElementById("calculate-button");
    const resultParagraph = document.getElementById("result");

    /* When the button is clicked, calculate the petrol total cost.
       Show an error message if the input values are invalid or negative. */
    calculateButton.addEventListener("click", () => {
      const pricePerLiter = parseFloat(priceInput.value);
      const litersPurchased = parseFloat(litersInput.value);

      if (isNaN(pricePerLiter) || pricePerLiter < 0 || isNaN(litersPurchased) || litersPurchased < 0) {
        resultParagraph.textContent = "Please enter valid non-negative values.";
        resultParagraph.style.color = "#a00";
        return;
      }

      const totalCost = pricePerLiter * litersPurchased;
      const formattedCost = totalCost.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

      resultParagraph.textContent = `Total cost: ${formattedCost} USD.`;
      resultParagraph.style.color = "#1f3252";
    });
  </script>
</body>
</html>
